<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overtrade คืออะไร?</title>

<style>
/* วาง CSS ที่คุณส่งมาทั้งหมดตรงนี้ */
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Kanit',sans-serif;
    color:white;
    line-height:1.8;
    background:linear-gradient(
        -45deg,
        #050014,
        #17002e,
        #2b0055,
        #001a4d
    );
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:5rem;
    color:#e879f9;
    text-shadow:
        0 0 10px #e879f9,
        0 0 20px #e879f9,
        0 0 40px #a855f7,
        0 0 80px #7c3aed;
}

.hero p{
    color:#d8b4fe;
    font-size:1.4rem;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(236,72,153,0.4);
    backdrop-filter:blur(15px);

    border-radius:25px;
    padding:30px;
    margin-bottom:30px;

    transition:0.4s;
    box-shadow:
        0 0 15px rgba(168,85,247,.2);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:
        0 0 20px #ec4899,
        0 0 40px #a855f7,
        0 0 60px #3b82f6;
}

h2{
    color:#f0abfc;
    margin-bottom:15px;

    text-shadow:
        0 0 10px #d946ef,
        0 0 20px #d946ef;
}

ul{
    padding-left:20px;
}

li{
    margin-bottom:8px;
}

footer{
    text-align:center;
    padding:50px;
    border-top:1px solid rgba(255,255,255,0.1);
    margin-top:50px;
}

.glow{
    color:#f0abfc;
    text-shadow:
        0 0 10px #e879f9,
        0 0 20px #e879f9,
        0 0 40px #a855f7;
}
</style>

</head>

<body>

<section class="hero">
    <h1>Overtrade</h1>
    <p>พฤติกรรมที่นักเทรดควรหลีกเลี่ยง</p>
</section>

<div class="container">

    <div class="card">
        <h2>Overtrade คืออะไร?</h2>
        <p>
            Overtrade คือการซื้อขายมากเกินความจำเป็น
            โดยไม่ได้ทำตามแผนที่วางไว้
        </p>
    </div>

    <div class="card">
        <h2>สาเหตุของ Overtrade</h2>
        <ul>
            <li>ต้องการกำไรเร็ว</li>
            <li>ใช้อารมณ์ในการตัดสินใจ</li>
            <li>ขาดวินัยในการเทรด</li>
        </ul>
    </div>

</div>

<footer>
    <h3 class="glow">ผู้จัดทำ</h3>
    <p>ชิษณุพงศ์ ผาสุขล้ำ</p>
</footer>

</body>
</html>
